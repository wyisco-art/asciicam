<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Cam</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/face_detection.js" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; cursor: none; }
    #cam, #ascii { position: absolute; top: 0; left: 0; height: 100%; }
    #cam   { object-fit: cover; }
    #ascii { display: block; }
    #scratch { display: none; }
  </style>
</head>
<body>
  <video id="cam" autoplay muted playsinline></video>
  <canvas id="ascii"></canvas>
  <canvas id="scratch"></canvas>

  <script>
    // ── Character ramp ─────────────────────────────────────────────────────────
    const CHARS    = " .'`^\",:;Il!i><~+_-?][}{1)(|\\/tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$";
    const MAX_EDGE = 1.4; // Sobel magnitude normalizer

    // ── Themes — keys 1-9 select indices 0-8, key 0 selects index 9 ───────────
    const THEMES = [
      { bg: '#000000', fg: '#00ff41',  mode: 'solid'   }, // 1 Matrix
      { bg: '#000000', fg: '#ffb000',  mode: 'solid'   }, // 2 Amber
      { bg: '#000000', fg: '#e8e8e8',  mode: 'solid'   }, // 3 Terminal
      { bg: '#f0f0f0', fg: '#000000',  mode: 'solid'   }, // 4 Inverted
      { bg: '#0a0000', fg: '#ff3300',  mode: 'solid'   }, // 5 Doom
      { bg: '#0d0025', fg: '#00ffff',  mode: 'solid'   }, // 6 Cyberpunk
      { bg: '#1a0035', fg: '#f72585',  mode: 'solid'   }, // 7 Synthwave
      { bg: '#060d30', fg: '#ff71ce',  mode: 'solid'   }, // 8 Vaporwave
      { bg: '#001100', fg: '#39ff14',  mode: 'solid'   }, // 9 Neon
      { bg: '#001f3f', fg: '#7ec8e3',  mode: 'solid'   }, // 0 Blueprint
      { bg: '#110800', fg: '#ffd700',  mode: 'solid'   }, //   Gold
      { bg: '#0a0010', fg: '#bf5fff',  mode: 'solid'   }, //   Ultraviolet
      { bg: '#001020', fg: '#a8d8ff',  mode: 'solid'   }, //   Ice
      { bg: '#000000', fg: null,       mode: 'color'   }, //   Full Color
      { bg: '#000000', fg: null,       mode: 'rainbow' }, //   Rainbow
      { bg: '#000000', fg: null,       mode: 'heat'    }, //   Heat
      { bg: '#000000', fg: null,       mode: 'glitch'  }, //   Glitch
    ];

    // ── State ─────────────────────────────────────────────────────────────────
    let splitPct     = 0.5;
    let tIdx         = 0;
    let currentCellH = 13;
    let targetCellH  = 13;
    let frameCount   = 0;
    let fdInFlight   = false;
    let dragging     = false;
    let faceData     = null; // { cx, cy, bx, by, bw, bh } — all normalized 0..1

    // Feature toggles
    let faceBoxOn = false;
    let trailOn   = false;
    let dofOn     = false;
    let edgeOn    = false;

    // ── Elements ──────────────────────────────────────────────────────────────
    const cam     = document.getElementById('cam');
    const ascii   = document.getElementById('ascii');
    const scratch = document.getElementById('scratch');
    const ctx     = ascii.getContext('2d', { alpha: false });
    const sctx    = scratch.getContext('2d', { willReadFrequently: true });

    // ── Layout ────────────────────────────────────────────────────────────────
    function applyLayout() {
      const lw = Math.round(window.innerWidth * splitPct);
      const rw = window.innerWidth - lw;
      cam.style.width   = lw + 'px';
      ascii.style.left  = lw + 'px';
      ascii.style.width = rw + 'px';
      ascii.width       = rw;
      ascii.height      = window.innerHeight;
    }
    applyLayout();
    window.addEventListener('resize', applyLayout);

    // ── Invisible drag handle ─────────────────────────────────────────────────
    const DRAG_ZONE = 10;
    document.addEventListener('mousemove', e => {
      const seam = window.innerWidth * splitPct;
      if (dragging) {
        splitPct = Math.min(0.85, Math.max(0.15, e.clientX / window.innerWidth));
        applyLayout();
        document.body.style.cursor = 'col-resize';
      } else {
        document.body.style.cursor = Math.abs(e.clientX - seam) < DRAG_ZONE ? 'col-resize' : 'none';
      }
    });
    document.addEventListener('mousedown', e => {
      if (Math.abs(e.clientX - window.innerWidth * splitPct) < DRAG_ZONE) {
        dragging = true; e.preventDefault();
      }
    });
    document.addEventListener('mouseup', () => { dragging = false; });

    // ── Keys ─────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.key >= '1' && e.key <= '9') { tIdx = parseInt(e.key) - 1; return; }
      if (e.key === '0')                 { tIdx = 9; return; }
      switch (e.key) {
        case ',': case '<': tIdx = (tIdx - 1 + THEMES.length) % THEMES.length; break;
        case '.': case '>': tIdx = (tIdx + 1) % THEMES.length;                 break;
        case 'f': case 'F': faceBoxOn = !faceBoxOn; break;
        case 't': case 'T': trailOn   = !trailOn;   break;
        case 'd': case 'D': dofOn     = !dofOn;     break;
        case 'e': case 'E': edgeOn    = !edgeOn;    break;
      }
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function hexToRgb(hex) {
      return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
    }

    function sobelEdges(px, cols, rows) {
      const edges = new Float32Array(cols * rows);
      const luma  = (idx) => {
        const i = idx * 4;
        return (0.299 * px[i] + 0.587 * px[i+1] + 0.114 * px[i+2]) / 255;
      };
      for (let r = 1; r < rows - 1; r++) {
        for (let c = 1; c < cols - 1; c++) {
          const tl = luma((r-1)*cols+(c-1)), tc = luma((r-1)*cols+c), tr = luma((r-1)*cols+(c+1));
          const ml = luma(r*cols+(c-1)),                               mr = luma(r*cols+(c+1));
          const bl = luma((r+1)*cols+(c-1)), bc = luma((r+1)*cols+c), bv = luma((r+1)*cols+(c+1));
          const gx = -tl + tr - 2*ml + 2*mr - bl + bv;
          const gy = -tl - 2*tc - tr + bl + 2*bc + bv;
          edges[r*cols+c] = Math.sqrt(gx*gx + gy*gy);
        }
      }
      return edges;
    }

    // ── MediaPipe face detection ───────────────────────────────────────────────
    const fd = new FaceDetection({
      locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection@0.4/${f}`
    });
    fd.setOptions({ model: 'short', minDetectionConfidence: 0.5 });
    fd.onResults(results => {
      fdInFlight = false;
      if (results.detections && results.detections.length > 0) {
        const b = results.detections[0].boundingBox;
        faceData = { cx: b.xCenter, cy: b.yCenter,
                     bx: b.xCenter - b.width/2, by: b.yCenter - b.height/2,
                     bw: b.width, bh: b.height };
        targetCellH = 4 + Math.min(b.width / 0.65, 1) * 24;
      } else {
        targetCellH += (13 - targetCellH) * 0.05;
      }
    });

    // ── Camera ────────────────────────────────────────────────────────────────
    navigator.mediaDevices
      .getUserMedia({ video: { facingMode: 'environment' }, audio: false })
      .catch(() => navigator.mediaDevices.getUserMedia({ video: true, audio: false }))
      .then(stream => { cam.srcObject = stream; requestAnimationFrame(loop); });

    // ── Render loop ───────────────────────────────────────────────────────────
    function loop() {
      requestAnimationFrame(loop);
      if (cam.readyState < 2) return;
      frameCount++;

      if (frameCount % 5 === 0 && !fdInFlight) {
        fdInFlight = true;
        fd.send({ image: cam }).catch(() => { fdInFlight = false; });
      }

      currentCellH += (targetCellH - currentCellH) * 0.08;
      const cellH = Math.max(4, Math.round(currentCellH));
      const theme = THEMES[tIdx];
      const W = ascii.width;
      const H = ascii.height;

      ctx.font = `${cellH}px monospace`;
      const cellW = ctx.measureText('M').width;
      const cols  = Math.floor(W / cellW);
      const rows  = Math.floor(H / cellH);
      if (cols < 1 || rows < 1) return;

      if (scratch.width !== cols || scratch.height !== rows) {
        scratch.width = cols; scratch.height = rows;
      }

      sctx.drawImage(cam, 0, 0, cols, rows);
      const px    = sctx.getImageData(0, 0, cols, rows).data;
      const edges = edgeOn ? sobelEdges(px, cols, rows) : null;

      // Background — semi-transparent for trail effect
      const [bgR, bgG, bgB] = hexToRgb(theme.bg);
      ctx.fillStyle = trailOn
        ? `rgba(${bgR},${bgG},${bgB},0.55)`
        : theme.bg;
      ctx.fillRect(0, 0, W, H);

      ctx.font         = `${cellH}px monospace`;
      ctx.textBaseline = 'top';

      // ── Characters ──────────────────────────────────────────────────────────
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          const i  = (row * cols + col) * 4;
          const r  = px[i], g = px[i+1], b = px[i+2];
          const br = (0.299*r + 0.587*g + 0.114*b) / 255;

          // Char: edge strength or brightness
          const ci   = edgeOn
            ? Math.round(Math.min(edges[row*cols+col] / MAX_EDGE, 1) * (CHARS.length-1))
            : Math.round(br * (CHARS.length-1));
          const char = CHARS[ci];
          if (char === ' ') continue;

          // Color
          let color;
          switch (theme.mode) {
            case 'solid':   color = theme.fg; break;
            case 'color':   color = `rgb(${r},${g},${b})`; break;
            case 'rainbow': {
              const h = (col/cols*360 + row/rows*120 + frameCount*0.8) % 360;
              color = `hsl(${h},100%,${30+br*45}%)`;
              break;
            }
            case 'heat': {
              let hr, hg, hb;
              if      (br < 0.33) { hr=Math.round(br/0.33*255); hg=0;   hb=0; }
              else if (br < 0.66) { const s=(br-0.33)/0.33; hr=255; hg=Math.round(s*165);      hb=0; }
              else                { const s=(br-0.66)/0.34; hr=255; hg=Math.round(165+s*90);   hb=Math.round(s*255); }
              color = `rgb(${hr},${hg},${hb})`;
              break;
            }
            case 'glitch': {
              const glitched = Math.sin(row*0.3 + frameCount*0.07) > 0.85;
              if (glitched) {
                const gr = px[((row*cols + Math.min(col+2,cols-1))*4)];
                const gb = px[((row*cols + Math.max(col-2,0))*4)+2];
                color = `rgb(${gr},${g},${gb})`;
              } else {
                color = `rgb(${r},${g},${b})`;
              }
              break;
            }
          }

          ctx.fillStyle = color;
          ctx.fillText(char, col * cellW, row * cellH);
        }
      }

      // ── Depth of field overlay ───────────────────────────────────────────────
      if (dofOn) {
        const fx = (faceData ? faceData.cx : 0.5) * W;
        const fy = (faceData ? faceData.cy : 0.5) * H;
        const r0 = faceData ? Math.max(faceData.bw * W, faceData.bh * H) * 0.6  : Math.min(W,H) * 0.2;
        const r1 = faceData ? Math.max(faceData.bw * W, faceData.bh * H) * 2.4  : Math.min(W,H) * 0.9;
        const grad = ctx.createRadialGradient(fx, fy, r0, fx, fy, r1);
        grad.addColorStop(0, `rgba(${bgR},${bgG},${bgB},0)`);
        grad.addColorStop(1, `rgba(${bgR},${bgG},${bgB},0.94)`);
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      }

      // ── Face tracking box ────────────────────────────────────────────────────
      if (faceBoxOn && faceData) {
        ctx.fillStyle = theme.fg || '#00ff41';
        ctx.font      = `${cellH}px monospace`;

        const fc  = Math.max(0,       Math.round(faceData.bx * cols));
        const fr  = Math.max(0,       Math.round(faceData.by * rows));
        const fc2 = Math.min(cols-1,  fc + Math.round(faceData.bw * cols));
        const fr2 = Math.min(rows-1,  fr + Math.round(faceData.bh * rows));

        for (let c = fc+1; c < fc2; c++) {
          ctx.fillText('─', c*cellW, fr*cellH);
          ctx.fillText('─', c*cellW, fr2*cellH);
        }
        for (let r = fr+1; r < fr2; r++) {
          ctx.fillText('│', fc*cellW,  r*cellH);
          ctx.fillText('│', fc2*cellW, r*cellH);
        }
        ctx.fillText('┌', fc*cellW,  fr*cellH);
        ctx.fillText('┐', fc2*cellW, fr*cellH);
        ctx.fillText('└', fc*cellW,  fr2*cellH);
        ctx.fillText('┘', fc2*cellW, fr2*cellH);
      }
    }
  </script>
</body>
</html>
